name: Archive encrypted production backup

on:
  schedule:
    - cron: "47 4 * * *"
  workflow_dispatch:
  workflow_run:
    workflows:
      - Deploy cryptosugarbabes.com
    types:
      - completed

permissions:
  contents: read

jobs:
  archive:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Configure VPS access
        env:
          VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          if [ -n "$VPS_SSH_KEY_B64" ]; then
            printf '%s' "$VPS_SSH_KEY_B64" | base64 --decode > ~/.ssh/cryptosugarbabes_vps
          else
            printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/cryptosugarbabes_vps
          fi
          chmod 600 ~/.ssh/cryptosugarbabes_vps
          ssh-keygen -y -f ~/.ssh/cryptosugarbabes_vps >/dev/null
          ssh-keyscan -H 161.35.17.40 >> ~/.ssh/known_hosts

      - name: Download encrypted backup archives
        run: |
          mkdir -p encrypted-backup
          scp -i ~/.ssh/cryptosugarbabes_vps -o BatchMode=yes -o IdentitiesOnly=yes \
            'cryptodeploy@161.35.17.40:/opt/cryptosugarbabes/shared/offsite-export/*.enc' \
            encrypted-backup/
          scp -i ~/.ssh/cryptosugarbabes_vps -o BatchMode=yes -o IdentitiesOnly=yes \
            cryptodeploy@161.35.17.40:/opt/cryptosugarbabes/shared/offsite-export/SHA256SUMS \
            encrypted-backup/
          test "$(find encrypted-backup -name '*.enc' -type f -size +0c | wc -l)" -ge 2
          cd encrypted-backup
          sha256sum --check SHA256SUMS

      - name: Store offsite backup
        uses: actions/upload-artifact@v4
        with:
          name: cryptosugar-encrypted-backup-${{ github.run_id }}
          path: encrypted-backup/
          retention-days: 30
          if-no-files-found: error

      - name: Confirm offsite copy
        run: |
          ssh -i ~/.ssh/cryptosugarbabes_vps -o BatchMode=yes -o IdentitiesOnly=yes \
            cryptodeploy@161.35.17.40 \
            'touch /opt/cryptosugarbabes/shared/offsite-export/.last-offsite-success'
