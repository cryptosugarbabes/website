name: Deploy cryptosugarbabes.com

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cryptosugarbabes-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out application
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production application
        env:
          NEXT_PUBLIC_REOWN_PROJECT_ID: ${{ secrets.REOWN_PROJECT_ID }}
          NEXT_PUBLIC_BASE_TREASURY_ADDRESS: ${{ vars.BASE_TREASURY_ADDRESS }}
          NEXT_PUBLIC_SOLANA_TREASURY_ADDRESS: ${{ vars.SOLANA_TREASURY_ADDRESS }}
        run: pnpm build

      - name: Package standalone release
        run: |
          mkdir -p release/.next
          cp -a .next/standalone/. release/
          cp -a .next/static release/.next/static
          if [ -d public ]; then cp -a public release/public; fi
          mkdir -p release/db
          cp -a db/migrations release/db/migrations
          for native_package in node_modules/.pnpm/@img+sharp-linux-x64@* node_modules/.pnpm/@img+sharp-libvips-linux-x64@*; do
            if [ -d "$native_package" ]; then cp -a "$native_package" release/node_modules/.pnpm/; fi
          done
          tar -C release -czf cryptosugarbabes-release.tgz .

      - name: Configure VPS access
        env:
          VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          if [ -n "$VPS_SSH_KEY_B64" ]; then
            printf '%s' "$VPS_SSH_KEY_B64" | base64 --decode > ~/.ssh/cryptosugarbabes_vps
          else
            printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/cryptosugarbabes_vps
          fi
          chmod 600 ~/.ssh/cryptosugarbabes_vps
          ssh-keygen -y -f ~/.ssh/cryptosugarbabes_vps >/dev/null || {
            echo "The VPS SSH key secret is missing or invalid. Add VPS_SSH_KEY_B64 as a repository secret."
            exit 1
          }
          ssh-keyscan -H 161.35.17.40 >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          ssh -i ~/.ssh/cryptosugarbabes_vps -o BatchMode=yes -o IdentitiesOnly=yes root@161.35.17.40 \
            "mkdir -p /tmp/cryptosugarbabes-deploy"
          scp -i ~/.ssh/cryptosugarbabes_vps -o BatchMode=yes -o IdentitiesOnly=yes \
            cryptosugarbabes-release.tgz \
            deploy/server/release.sh \
            deploy/server/cryptosugarbabes.service \
            deploy/server/backup-data.sh \
            deploy/server/verify-backup.sh \
            deploy/server/cryptosugar-backup.cron \
            root@161.35.17.40:/tmp/cryptosugarbabes-deploy/

      - name: Activate release and verify health
        run: |
          ssh -i ~/.ssh/cryptosugarbabes_vps -o BatchMode=yes -o IdentitiesOnly=yes root@161.35.17.40 \
            "bash /tmp/cryptosugarbabes-deploy/release.sh '${{ github.sha }}'"
