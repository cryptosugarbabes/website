services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: velora
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-before-deploy}
      POSTGRES_DB: velora
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velora"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
